<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 html</title>
    <style>
        body{
            background-color: bisque;
            font-size: 20px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: rgb(255, 255, 255);
            text-align:center ;
            background-image: url(Imagens/Socorro\ DEus.avif);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            
            
        }
        h1{
            background-color: rgb(255, 255, 255);
            color: black;
            font-weight: normal; /*Retirar ou colocar em negrito  */

        }

        p{
            background-color: chocolate;
            text-align: justify;
            width: 300px;
            height: 300px;
            margin-top: 300px;
            margin-left: 300px;
            padding: 20px;
            border: 5px;
            border-style: solid;
            border-color: brown;
            border-radius: 20%;
        }

        img{
            width: 400px;
            height: 350px;
            margin-top: 200px;
            border: 10px dotted #ff0;
        }

        hr{
            width: 50%;
            height: 5px;
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <h1> Testando titulos na pagina </h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus fugiat eius, officiis ducimus maxime explicabo temporibus vitae cupiditate quod? Amet cum esse debitis. Natus saepe voluptatum ipsum optio temporibus laudantium!
    </p> 
    <hr />

    <img src="Imagens 002/images.jpg" >
</body>
</html>
